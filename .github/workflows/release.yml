name: release

# Löst aus, sobald ein Tag im Format v* gepusht wird (z. B. v1.0.0).
# Manuell startbar über den "Run workflow"-Button (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Benötigt Schreibrechte auf Contents, um ein GitHub Release anlegen zu können.
permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    strategy:
      # Ein Build-Durchlauf je Ziel-Runtime (RID).
      matrix:
        rid:
          - win-x64
          - linux-x64
          - osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Version aus dem Tag ableiten (v1.2.3 -> 1.2.3). Fallback bei manuellem Lauf.
      - name: Version aus Tag bestimmen
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      # Self-contained Publish: lauffähig ohne installiertes .NET auf dem Zielsystem.
      - name: Publish
        run: >
          dotnet publish src/VibeConsoleApp/VibeConsoleApp.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/${{ matrix.rid }}

      # Archiv passend zur Plattform: zip für Windows, tar.gz für Unix.
      - name: Archiv erstellen
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r "../../SudokuMoveAdvisor-${{ steps.version.outputs.value }}-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../SudokuMoveAdvisor-${{ steps.version.outputs.value }}-${{ matrix.rid }}.tar.gz" .
          fi

      # Binaries als herunterladbares Build-Artefakt (auch ohne Release verfügbar).
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: SudokuMoveAdvisor-${{ matrix.rid }}
          path: |
            SudokuMoveAdvisor-*.zip
            SudokuMoveAdvisor-*.tar.gz
          if-no-files-found: error

      # Archiv an das GitHub Release anhängen (nur bei Tag-Push).
      - name: An GitHub Release anhängen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SudokuMoveAdvisor-*.zip
            SudokuMoveAdvisor-*.tar.gz
